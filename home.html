<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundova — Physical AI Infrastructure for Real-World Robotics</title>
  <style>
    @font-face { font-family: "Roboto"; src: url("prop/Roboto-Regular.ttf") format("truetype"); font-weight: 400; font-display: swap; }
    @font-face { font-family: "Roboto"; src: url("prop/Roboto-Medium.ttf") format("truetype"); font-weight: 500; font-display: swap; }
    @font-face { font-family: "Roboto"; src: url("prop/Roboto-Bold.ttf") format("truetype"); font-weight: 700; font-display: swap; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: "Roboto", sans-serif; font-weight: 400; background: #0a0a0a; color: #fff; -webkit-font-smoothing: antialiased; }
    .hero { position: relative; min-height: 100vh; display: flex; flex-direction: column; color: #fff; overflow: hidden; }
    .hero-media { position: absolute; inset: 0; }
    .hero-bg-image, .hero-bg-image img { width: 100%; height: 100%; display: block; object-fit: cover; object-position: center; }
    .hero-bg-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(6,8,12,0.72) 0%, rgba(6,8,12,0.45) 40%, rgba(6,8,12,0.68) 100%);
    }
    .hero-bg-overlay::after { content: ""; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 35%, transparent 0%, rgba(0,0,0,0.35) 100%); }
    .header { position: relative; z-index: 10; padding: 28px 48px; }
    .logo img { height: 20px; display: block; border-radius: 6px; }
    .hero-main { position: relative; z-index: 5; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 32px 48px; }
    .hero-title { font-weight: 400; letter-spacing: -0.01em; line-height: 1.1; margin-bottom: 24px; width: 100%; max-width: 960px; padding: 0 24px; }
    .hero-title-line { display: block; white-space: nowrap; font-size: clamp(2.25rem, 5.5vw, 4.25rem); }
    .hero-desc { font-size: clamp(1rem, 1.6vw, 1.125rem); line-height: 1.65; color: rgba(255,255,255,0.62); width: 100%; max-width: 960px; padding: 0 24px; }
    .hero-desc-line { display: block; }
    .hero-desc-line--after { white-space: nowrap; font-size: clamp(0.8125rem, 1.4vw, 1.125rem); }
    .scroll-link { position: relative; z-index: 10; display: inline-flex; align-items: center; gap: 14px; margin: 0 auto 40px; padding: 10px 18px; border: 1px solid rgba(255,255,255,0.22); border-radius: 999px; text-decoration: none; color: rgba(255,255,255,0.7); font-size: 0.8125rem; backdrop-filter: blur(6px); transition: border-color 0.2s, color 0.2s; }
    .scroll-link:hover { color: #fff; border-color: rgba(255,255,255,0.45); }
    .scroll-icon { width: 18px; height: 28px; border: 1.5px solid rgba(255,255,255,0.45); border-radius: 9px; position: relative; }
    .scroll-icon::after { content: ""; position: absolute; top: 5px; left: 50%; width: 3px; height: 6px; margin-left: -1.5px; background: rgba(255,255,255,0.7); border-radius: 2px; animation: wheel 2s ease-in-out infinite; }
    @keyframes wheel { 0%,100% { transform: translateY(0); opacity: 1; } 50% { transform: translateY(6px); opacity: 0.3; } }
    @media (max-width: 860px) {
      .header { padding: 20px 24px; }
      .hero-title-line, .hero-desc-line--after { white-space: normal; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-media" aria-hidden="true">
      <picture class="hero-bg-image">
        <source srcset="prop/wheeled_robot_background_2.webp" type="image/webp" />
        <img src="prop/wheeled_robot_background_2.jpg" alt="" />
      </picture>
      <div class="hero-bg-overlay"></div>
    </div>
    <header class="header"><a href="home.html" class="logo"><img src="prop/foundova_logo_2.png" alt="Foundova" /></a></header>
    <main class="hero-main">
      <h1 class="hero-title">
        <span class="hero-title-line">Physical AI Infrastructure</span>
        <span class="hero-title-line">for Real-World Robotics</span>
      </h1>
      <p class="hero-desc">
        <span class="hero-desc-line">We help robotics teams move from demos to deployment through</span>
        <span class="hero-desc-line hero-desc-line--after">robot hardware, real-world data systems, and remote operation infrastructure.</span>
      </p>
    </main>
    <a href="careers.html" class="scroll-link"><div class="scroll-icon" aria-hidden="true"></div>Careers</a>
  </section>
</body>
</html>
